<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Samir Fazelyar</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Vazirmatn',sans-serif;

background:linear-gradient(to bottom,#0f172a,#2563eb);

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
padding:20px;
}

/* باکس اصلی */

.box{
width:100%;
max-width:420px;

background:white;

padding:30px 25px;

border-radius:30px;

text-align:center;

box-shadow:
0 10px 30px rgba(0,0,0,0.15);
}

/* بخش بالا */

.top{
display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:25px;
}

/* لوگو */

.logo{
width:110px;
}

/* عکس پروفایل مستطیلی */

.profile{
width:130px;
height:130px;

/* چهارگوش */
border-radius:18px;

/* کل عکس داخل قاب */
object-fit:cover;

/* تنظیم موقعیت عکس */
object-position:center top;

/* بدون قاب سفید */
border:none;

display:block;
}

/* اسم */

h1{
font-size:32px;
color:#222;
margin-bottom:30px;
font-weight:700;
}

/* دکمه ها */

a{
display:flex;
align-items:center;
justify-content:center;

gap:10px;

margin:15px 0;
padding:17px;

border-radius:18px;

text-decoration:none;

font-size:18px;
font-weight:600;

transition:0.3s;

color:white;
}

/* رنگ دکمه ها */

.call{
background:#e53935;
}

.whatsapp{
background:#25D366;
}

.location{
background:#1976d2;
}

/* افکت */

a:hover{
transform:translateY(-3px);
opacity:0.92;
}

/* موبایل */

@media(max-width:500px){

.box{
padding:25px 18px;
}

h1{
font-size:27px;
}

a{
font-size:16px;
padding:15px;
}

.logo{
width:90px;
}

.profile{
width:115px;
height:115px;
}

}

</style>
</head>

<body>

<div class="box">

<!-- بالا -->
<div class="top">

<!-- عکس -->
<img src="profile.jpg" alt="Samir Fazelyar" class="profile">

<!-- لوگو -->
<img src="logo.png" alt="Logo" class="logo">

</div>

<!-- اسم -->
<h1>Samir Fazelyar</h1>

<!-- تماس -->
<a class="call" href="tel:+93799709269">
📞 تماس مستقیم
</a>

<!-- واتساپ -->
<a class="whatsapp" href="https://wa.me/93794129129">
💬 واتساپ
</a>

<!-- لوکیشن -->
<a class="location" href="https://maps.app.goo.gl/qfr6CD8ryAexf2AJA">
📍 لوکیشن شاپ
</a>

</div>

</body>
</html>
